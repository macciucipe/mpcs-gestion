<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · MPC Gestión</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="portal-layout">
  <div class="main-content" id="main">
    <div class="page-header">
      <div class="page-header-left">
        <h1 id="page-title">Dashboard</h1>
        <p id="page-sub">Bienvenido al portal de gestión</p>
      </div>
      <div class="page-header-right">
        <span id="header-empresa" class="badge badge-blue"></span>
      </div>
    </div>

    <div class="page-body">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-card-top">
            <div class="stat-icon blue">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-empleados">—</div>
          <div class="stat-label">Empleados activos</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top">
            <div class="stat-icon yellow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-pendientes">—</div>
          <div class="stat-label">Solicitudes pendientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top">
            <div class="stat-icon blue">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-empresas">—</div>
          <div class="stat-label">Empresas activas</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top">
            <div class="stat-icon green">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-locales">—</div>
          <div class="stat-label">Locales activos</div>
        </div>
        <!-- Stats compras (solo visible si tiene acceso) -->
        <div class="stat-card" id="stat-card-oc" style="display:none">
          <div class="stat-card-top">
            <div class="stat-icon yellow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-oc">—</div>
          <div class="stat-label">OC/OS pendientes</div>
        </div>
        <div class="stat-card" id="stat-card-prov" style="display:none">
          <div class="stat-card-top">
            <div class="stat-icon green">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
          </div>
          <div class="stat-value" id="stat-prov">—</div>
          <div class="stat-label">Proveedores activos</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <!-- Últimas solicitudes disciplinarias -->
        <div class="card">
          <div class="card-header">
            <h2>Últimas solicitudes disciplinarias</h2>
            <a href="rrhh/disciplinario.html" class="btn btn-ghost btn-sm">Ver todas</a>
          </div>
          <div class="card-body" id="list-disciplinario">
            <div class="loading">Cargando...</div>
          </div>
        </div>

        <!-- Últimas OC (solo si tiene acceso compras) -->
        <div class="card" id="card-oc" style="display:none">
          <div class="card-header">
            <h2>Últimas órdenes de compra</h2>
            <a href="compras/ordenes-compra.html" class="btn btn-ghost btn-sm">Ver todas</a>
          </div>
          <div class="card-body" id="list-oc">
            <div class="loading">Cargando...</div>
          </div>
        </div>

        <!-- Accesos rápidos -->
        <div class="card" id="card-accesos">
          <div class="card-header"><h2>Accesos rápidos</h2></div>
          <div class="card-body">
            <div style="display:flex;flex-direction:column;gap:8px" id="accesos-rapidos"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    let perfil = null;

    async function init() {
      perfil = await requireAuth();
      if (!perfil) return;

      renderSidebar(perfil, 'dashboard');
      document.getElementById('page-sub').textContent = `Bienvenido, ${perfil.nombre.split(' ')[0]}`;
      document.getElementById('header-empresa').textContent =
        perfil.empresas?.razon_social || 'MPC Soluciones';

      const isCompras = ['admin','compras','gerencia'].includes(perfil.rol) ||
                        perfil.perm_oc || perfil.perm_or || perfil.perm_prov;

      if (isCompras) {
        document.getElementById('stat-card-oc').style.display   = '';
        document.getElementById('stat-card-prov').style.display = '';
        document.getElementById('card-oc').style.display        = '';
        document.getElementById('card-accesos').style.gridColumn = '';
      }

      await loadStats(isCompras);
      await loadDisciplinario();
      if (isCompras) await loadUltimasOC();
      renderAccesos(isCompras);
    }

    async function loadStats(isCompras) {
      const isAdmin = perfil.rol === 'admin';

      let qEmp = sbClient.from('empleados').select('id_empleado', {count:'exact'}).eq('estado','activo');
      if (!isAdmin) qEmp = qEmp.eq('ruc_empresa', perfil.ruc_empresa);
      const { count: cEmp } = await qEmp;
      document.getElementById('stat-empleados').textContent = cEmp || 0;

      const { count: cPend } = await sbClient.from('medidas_disciplinarias')
        .select('id', {count:'exact'}).eq('estado','pendiente');
      document.getElementById('stat-pendientes').textContent = cPend || 0;

      if (isAdmin) {
        const { count: cEmpres } = await sbClient.from('empresas')
          .select('ruc', {count:'exact'}).eq('estado','activa');
        document.getElementById('stat-empresas').textContent = cEmpres || 0;
      } else {
        document.getElementById('stat-empresas').textContent = '1';
      }

      let qLoc = sbClient.from('locales').select('id_local', {count:'exact'}).eq('estado','activo');
      if (!isAdmin) qLoc = qLoc.eq('ruc_empresa', perfil.ruc_empresa);
      const { count: cLoc } = await qLoc;
      document.getElementById('stat-locales').textContent = cLoc || 0;

      if (isCompras) {
        const { count: cOC } = await sbClient.from('ordenes_compra')
          .select('id_oc', {count:'exact'}).eq('estado','pendiente');
        document.getElementById('stat-oc').textContent = cOC || 0;

        const { count: cProv } = await sbClient.from('proveedores')
          .select('documento', {count:'exact'}).eq('estado','activo');
        document.getElementById('stat-prov').textContent = cProv || 0;
      }
    }

    async function loadDisciplinario() {
      const { data } = await sbClient.from('medidas_disciplinarias')
        .select('id, nombre_trabajador, empresa, clasificacion, estado, fecha_envio')
        .order('fecha_envio', { ascending: false })
        .limit(5);

      const container = document.getElementById('list-disciplinario');
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No hay solicitudes recientes</p></div>';
        return;
      }
      container.innerHTML = data.map(d => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:13px;font-weight:500">${d.nombre_trabajador}</div>
            <div style="font-size:12px;color:var(--text-muted)">${d.empresa} · ${d.clasificacion}</div>
          </div>
          ${getEstadoBadge(d.estado)}
        </div>
      `).join('');
    }

    async function loadUltimasOC() {
      const { data } = await sbClient.from('ordenes_compra')
        .select('numero, tipo, proveedor, id_local, total, estado, created_at')
        .order('created_at', { ascending: false })
        .limit(5);

      const container = document.getElementById('list-oc');
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No hay órdenes recientes</p></div>';
        return;
      }
      container.innerHTML = data.map(d => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:13px;font-weight:500">${d.numero || d.id_oc}</div>
            <div style="font-size:12px;color:var(--text-muted)">${d.proveedor} · S/ ${parseFloat(d.total||0).toFixed(2)}</div>
          </div>
          ${getEstadoBadge(d.estado)}
        </div>
      `).join('');
    }

    function renderAccesos(isCompras) {
      const links = [];
      if (['admin','rrhh','gerencia'].includes(perfil.rol)) {
        links.push({ href: 'rrhh/empleados.html',    label: 'Ver empleados',           icon: icons.users });
        links.push({ href: 'rrhh/disciplinario.html', label: 'Medidas disciplinarias', icon: icons.alert });
      }
      if (isCompras) {
        links.push({ href: 'compras/proveedores.html',    label: 'Gestionar proveedores',  icon: icons.users });
        links.push({ href: 'compras/ordenes-compra.html', label: 'Nueva orden de compra',  icon: icons.cart  });
      }
      if (perfil.rol === 'admin') {
        links.push({ href: 'admin/empresas.html', label: 'Gestionar empresas', icon: icons.building });
        links.push({ href: 'admin/usuarios.html', label: 'Gestionar usuarios', icon: icons.shield   });
      }

      document.getElementById('accesos-rapidos').innerHTML = links.map(l => `
        <a href="${l.href}" class="btn" style="justify-content:flex-start;gap:10px">
          ${l.icon} ${l.label}
        </a>
      `).join('');
    }

    init();
  </script>
</body>
</html>
