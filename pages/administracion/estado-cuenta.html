<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estado de cuenta · MPC Gestión</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .prov-card {
      background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:1rem 1.25rem;cursor:pointer;transition:all .15s;margin-bottom:8px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .prov-card:hover { border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .prov-card.active { border-color:var(--navy);background:var(--navy-light,#EEF2FB); }
    .deuda-chip {
      padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;
    }
    .deuda-vencida { background:#FEE2E2;color:#991B1B; }
    .deuda-vigente { background:#FEF3C7;color:#92400E; }
    .deuda-ok      { background:#D1FAE5;color:#065F46; }
    .mov-row { padding:10px 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:100px 1fr auto auto;gap:12px;align-items:center;font-size:13px; }
    .mov-row:last-child { border-bottom:none; }
    .tipo-badge { display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600; }
    .tipo-factura  { background:#EDE9FE;color:#5B21B6; }
    .tipo-pago     { background:#D1FAE5;color:#065F46; }
    .tipo-nc       { background:#FEF3C7;color:#92400E; }
    .saldo-positivo { color:var(--error);font-weight:700; }
    .saldo-cero     { color:var(--success);font-weight:700; }
  </style>
</head>
<body class="portal-layout">
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Estado de cuenta proveedores</h1>
        <p>Saldos, movimientos y deuda por proveedor</p>
      </div>
    </div>

    <div class="page-body">
      <!-- Stats globales -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem">
        <div class="stat-card"><div class="stat-value" id="stat-proveedores">—</div><div class="stat-label">Proveedores con saldo</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-deuda-total" style="color:var(--navy)">—</div><div class="stat-label">Deuda total (S/)</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-deuda-vencida" style="color:var(--error)">—</div><div class="stat-label">Vencida (S/)</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-proximos" style="color:var(--warning)">—</div><div class="stat-label">Vencen en 7 días (S/)</div></div>
      </div>

      <div style="display:grid;grid-template-columns:340px 1fr;gap:1.25rem;align-items:start">

        <!-- Lista de proveedores -->
        <div>
          <div style="margin-bottom:10px">
            <div class="search-bar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="search-prov" placeholder="Buscar proveedor..." oninput="filtrarProveedores()" />
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:10px">
            <button class="btn btn-sm btn-primary" id="filt-todos" onclick="setFiltro('')">Todos</button>
            <button class="btn btn-sm btn-ghost" id="filt-vencidos" onclick="setFiltro('vencido')">Vencidos</button>
            <button class="btn btn-sm btn-ghost" id="filt-vigentes" onclick="setFiltro('vigente')">Vigentes</button>
          </div>
          <div id="lista-proveedores" style="max-height:calc(100vh - 280px);overflow-y:auto">
            <div class="loading">Cargando...</div>
          </div>
        </div>

        <!-- Detalle del proveedor seleccionado -->
        <div id="panel-detalle">
          <div class="card" style="padding:2rem;text-align:center;color:var(--text-muted)">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><line x1="16" y1="11" x2="16" y2="13"/></svg>
            <p>Seleccioná un proveedor para ver su estado de cuenta</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    let perfil       = null;
    let resumen      = [];   // saldo por proveedor
    let filtroActual = '';
    let provSeleccionado = null;

    async function init() {
      perfil = await requireAuth(['admin','compras','gerencia'], 'admin_pagos');
      if (!perfil) return;
      renderSidebar(perfil, 'estado-cuenta');
      onContextoChange(async () => await cargar());
      await cargar();
    }

    async function cargar() {
      const { ruc } = getContexto();

      // Traer facturas pendientes de pago
      let qFac = sbClient.from('facturas_proveedor')
        .select('ruc_emisor, nombre_emisor, total, total_pen, moneda, fecha_vencimiento, estado')
        .in('estado', ['validada','programada','observada']);
      if (ruc) qFac = qFac.eq('ruc_receptor', ruc);
      const { data: facturas } = await qFac;

      // Traer pagos ejecutados
      let qPag = sbClient.from('pagos_ejecutados')
        .select('ruc_proveedor, nombre_proveedor, monto_pen, fecha_pago');
      if (ruc) qPag = qPag.eq('ruc_empresa', ruc);
      const { data: pagos } = await qPag;

      // Agrupar por proveedor
      const mapa = {};
      const hoy  = new Date();
      const en7  = new Date(); en7.setDate(en7.getDate() + 7);

      for (const f of (facturas || [])) {
        if (!mapa[f.ruc_emisor]) {
          mapa[f.ruc_emisor] = {
            ruc: f.ruc_emisor, nombre: f.nombre_emisor,
            deuda: 0, pagado: 0, vencida: 0, proxima: 0,
            facturas: [], pagos: []
          };
        }
        const monto = parseFloat(f.total_pen || f.total || 0);
        const venc  = f.fecha_vencimiento ? new Date(f.fecha_vencimiento) : null;
        mapa[f.ruc_emisor].deuda += monto;
        mapa[f.ruc_emisor].facturas.push(f);
        if (venc && venc < hoy)    mapa[f.ruc_emisor].vencida  += monto;
        if (venc && venc <= en7 && venc >= hoy) mapa[f.ruc_emisor].proxima += monto;
      }

      for (const p of (pagos || [])) {
        if (!mapa[p.ruc_proveedor]) {
          mapa[p.ruc_proveedor] = {
            ruc: p.ruc_proveedor, nombre: p.nombre_proveedor,
            deuda: 0, pagado: 0, vencida: 0, proxima: 0,
            facturas: [], pagos: []
          };
        }
        mapa[p.ruc_proveedor].pagado += parseFloat(p.monto_pen || 0);
        mapa[p.ruc_proveedor].pagos.push(p);
      }

      resumen = Object.values(mapa).sort((a, b) => b.deuda - a.deuda);

      // Stats globales
      const conSaldo  = resumen.filter(p => p.deuda > 0);
      const totalDeuda= resumen.reduce((s, p) => s + p.deuda, 0);
      const totalVenc = resumen.reduce((s, p) => s + p.vencida, 0);
      const totalProx = resumen.reduce((s, p) => s + p.proxima, 0);

      document.getElementById('stat-proveedores').textContent   = conSaldo.length;
      document.getElementById('stat-deuda-total').textContent   = 'S/ ' + totalDeuda.toLocaleString('es-PE',{minimumFractionDigits:2});
      document.getElementById('stat-deuda-vencida').textContent = 'S/ ' + totalVenc.toLocaleString('es-PE',{minimumFractionDigits:2});
      document.getElementById('stat-proximos').textContent      = 'S/ ' + totalProx.toLocaleString('es-PE',{minimumFractionDigits:2});

      filtrarProveedores();
    }

    function setFiltro(filtro) {
      filtroActual = filtro;
      ['todos','vencidos','vigentes'].forEach(f => {
        document.getElementById(`filt-${f}`).className =
          (f === (filtro||'todos')) ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-ghost';
      });
      filtrarProveedores();
    }

    function filtrarProveedores() {
      const q = document.getElementById('search-prov').value.toLowerCase();
      let lista = resumen.filter(p =>
        (!q || (p.nombre||'').toLowerCase().includes(q) || p.ruc.includes(q))
      );
      if (filtroActual === 'vencido') lista = lista.filter(p => p.vencida > 0);
      if (filtroActual === 'vigente') lista = lista.filter(p => p.deuda > 0 && p.vencida === 0);

      const cont = document.getElementById('lista-proveedores');
      if (!lista.length) {
        cont.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:13px">Sin proveedores con saldo</div>';
        return;
      }
      cont.innerHTML = lista.map(p => {
        const chipClass = p.vencida > 0 ? 'deuda-vencida' : p.deuda > 0 ? 'deuda-vigente' : 'deuda-ok';
        const chipText  = p.vencida > 0
          ? `S/ ${p.vencida.toLocaleString('es-PE',{minimumFractionDigits:2})} vencida`
          : p.deuda > 0
            ? `S/ ${p.deuda.toLocaleString('es-PE',{minimumFractionDigits:2})} pendiente`
            : 'Al día';
        const isActive  = provSeleccionado === p.ruc;
        return `
          <div class="prov-card ${isActive?'active':''}" onclick="verEstadoCuenta('${p.ruc}')">
            <div style="min-width:0">
              <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.nombre||p.ruc}</div>
              <div style="font-size:11px;color:var(--text-muted);font-family:monospace">${p.ruc}</div>
            </div>
            <span class="deuda-chip ${chipClass}">${chipText}</span>
          </div>`;
      }).join('');
    }

    async function verEstadoCuenta(ruc) {
      provSeleccionado = ruc;
      filtrarProveedores(); // actualiza active state

      const p = resumen.find(x => x.ruc === ruc);
      if (!p) return;

      // Traer movimientos completos
      const [{ data: facturas }, { data: pagos }, { data: programados }] = await Promise.all([
        sbClient.from('facturas_proveedor')
          .select('id, numero_completo, fecha_emision, fecha_vencimiento, moneda, total, total_pen, estado')
          .eq('ruc_emisor', ruc).order('fecha_emision', { ascending: false }),
        sbClient.from('pagos_ejecutados')
          .select('id, fecha_pago, moneda, monto, monto_pen, numero_operacion, banco_origen')
          .eq('ruc_proveedor', ruc).order('fecha_pago', { ascending: false }),
        sbClient.from('programacion_pagos')
          .select('id, fecha_programada, moneda, monto, monto_pen, estado')
          .eq('ruc_proveedor', ruc)
          .not('estado', 'in', '(ejecutado,rechazado)')
          .order('fecha_programada'),
      ]);

      const hoy      = new Date();
      const saldo    = p.deuda;
      const pagadoT  = (pagos||[]).reduce((s,pg) => s + parseFloat(pg.monto_pen||pg.monto||0), 0);
      const saldoClass = saldo <= 0 ? 'saldo-cero' : 'saldo-positivo';

      // Construir movimientos unificados
      const movimientos = [
        ...(facturas||[]).map(f => ({
          fecha:  f.fecha_emision,
          tipo:   'factura',
          desc:   f.numero_completo,
          monto:  parseFloat(f.total_pen || f.total || 0),
          venc:   f.fecha_vencimiento,
          estado: f.estado,
          vencida: f.fecha_vencimiento && new Date(f.fecha_vencimiento) < hoy && f.estado !== 'pagada',
        })),
        ...(pagos||[]).map(pg => ({
          fecha:  pg.fecha_pago,
          tipo:   'pago',
          desc:   `Op. ${pg.numero_operacion||'—'} · ${pg.banco_origen||''}`,
          monto:  -parseFloat(pg.monto_pen || pg.monto || 0),
          venc:   null, estado: 'ejecutado', vencida: false,
        })),
      ].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

      document.getElementById('panel-detalle').innerHTML = `
        <!-- Header proveedor -->
        <div class="card" style="padding:1.25rem;margin-bottom:1rem">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div>
              <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">${p.nombre||p.ruc}</h2>
              <div style="font-family:monospace;font-size:13px;color:var(--text-muted)">${p.ruc}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px">Saldo pendiente</div>
              <div class="${saldoClass}" style="font-size:24px">S/ ${saldo.toLocaleString('es-PE',{minimumFractionDigits:2})}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
            ${kpi('Facturas pendientes', `S/ ${saldo.toLocaleString('es-PE',{minimumFractionDigits:2})}`, 'var(--navy)')}
            ${kpi('Vencido', `S/ ${p.vencida.toLocaleString('es-PE',{minimumFractionDigits:2})}`, p.vencida>0?'var(--error)':'var(--success)')}
            ${kpi('Vence en 7 días', `S/ ${p.proxima.toLocaleString('es-PE',{minimumFractionDigits:2})}`, p.proxima>0?'var(--warning)':'var(--text-muted)')}
            ${kpi('Total pagado hist.', `S/ ${pagadoT.toLocaleString('es-PE',{minimumFractionDigits:2})}`, 'var(--success)')}
          </div>
        </div>

        <!-- Pagos programados -->
        ${(programados||[]).length ? `
          <div class="card" style="padding:1.25rem;margin-bottom:1rem">
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:10px">Pagos programados</div>
            ${(programados||[]).map(pg => {
              const fecha = pg.fecha_programada ? new Date(pg.fecha_programada+'T12:00:00').toLocaleDateString('es-PE') : '—';
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
                <div>
                  <span style="font-weight:600">${fecha}</span>
                  <span class="badge badge-gray" style="margin-left:8px;font-size:11px">${pg.estado.replace(/_/g,' ')}</span>
                </div>
                <strong>${pg.moneda==='USD'?'US$ ':'S/ '}${parseFloat(pg.monto).toLocaleString('es-PE',{minimumFractionDigits:2})}</strong>
              </div>`;
            }).join('')}
          </div>` : ''}

        <!-- Movimientos -->
        <div class="card" style="padding:1.25rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)">Movimientos</div>
            <button class="btn btn-sm btn-ghost" onclick="imprimirEstadoCuenta('${ruc}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              Imprimir
            </button>
          </div>
          ${movimientos.length ? movimientos.map(m => {
            const fecha = m.fecha ? new Date(m.fecha+'T12:00:00').toLocaleDateString('es-PE') : '—';
            const venc  = m.venc  ? new Date(m.venc+'T12:00:00').toLocaleDateString('es-PE')  : null;
            const montoFmt = (m.monto < 0 ? '-' : '') + 'S/ ' + Math.abs(m.monto).toLocaleString('es-PE',{minimumFractionDigits:2});
            const montoColor = m.monto < 0 ? 'var(--success)' : m.vencida ? 'var(--error)' : 'var(--text)';
            const tipoBadge = m.tipo === 'pago'
              ? '<span class="tipo-badge tipo-pago">Pago</span>'
              : '<span class="tipo-badge tipo-factura">Factura</span>';
            return `<div class="mov-row">
              <div style="color:var(--text-muted)">${fecha}</div>
              <div>
                ${tipoBadge}
                <span style="margin-left:8px">${m.desc}</span>
                ${venc ? `<div style="font-size:11px;color:${m.vencida?'var(--error)':'var(--text-muted)'};margin-top:2px">
                  Vence: ${venc}${m.vencida?' ⚠ VENCIDA':''}
                </div>` : ''}
              </div>
              <span style="font-size:13px;color:${montoColor};font-weight:700;white-space:nowrap">${montoFmt}</span>
              <span class="badge ${m.estado==='pagada'?'badge-green':m.estado==='validada'?'badge-blue':m.estado==='observada'?'badge-yellow':'badge-gray'}" style="font-size:11px">${m.estado?.replace(/_/g,' ')||'—'}</span>
            </div>`;
          }).join('') : '<div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:13px">Sin movimientos registrados</div>'}
        </div>
      `;
    }

    function kpi(label, val, color) {
      return `<div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">${label}</div>
        <div style="font-size:15px;font-weight:700;color:${color}">${val}</div>
      </div>`;
    }

    function imprimirEstadoCuenta(ruc) {
      window.print();
    }

    init();
  </script>
</body>
</html>
