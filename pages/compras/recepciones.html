<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recepciones (OR) · MPC Gestión</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .or-badge-conforme        { background:#D1FAE5;color:#065F46; }
    .or-badge-parcial         { background:#FEF3C7;color:#92400E; }
    .or-badge-parcial_cerrada { background:#F3F4F6;color:#374151; }
    .or-badge-pendiente       { background:#DBEAFE;color:#1E40AF; }
    .or-badge-observada       { background:#FEF3C7;color:#92400E; }
    .or-badge-declinada       { background:#FEE2E2;color:#991B1B; }
    .exceso-row               { background:#FEF2F2 !important; }
    .obs-row                  { background:#FFFBEB !important; }
    .tab-btn { padding:8px 18px;border:none;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s; }
    .tab-btn.active { background:var(--navy);color:#fff; }
    .tab-btn:not(.active) { background:var(--bg);color:var(--text-muted); }
    .auth-btn {
      background:#D97706;color:#fff;border:none;border-radius:var(--radius-md);
      padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;
    }
    .auth-btn:hover { background:#B45309; }
  </style>
</head>
<body class="portal-layout">
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Recepciones (OR)</h1>
        <p>Órdenes de recepción generadas por los locales</p>
      </div>
    </div>

    <div class="page-body">
      <!-- Tabs por vista -->
      <div style="display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap">
        <button class="tab-btn active" id="tab-compras" onclick="setVista('compras')">
          ⚠ Para Compras
          <span id="badge-compras" style="background:#D97706;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:6px">0</span>
        </button>
        <button class="tab-btn" id="tab-admin" onclick="setVista('admin')">
          ✓ Para Administración
          <span id="badge-admin" style="background:var(--success);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:6px">0</span>
        </button>
        <button class="tab-btn" id="tab-todas" onclick="setVista('todas')">Todas</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(6,1fr);margin-bottom:1.5rem">
        <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Total OR</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-conforme" style="color:var(--success)">—</div><div class="stat-label">Conformes</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-parciales" style="color:var(--warning)">—</div><div class="stat-label">Parciales</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-observada" style="color:#D97706">—</div><div class="stat-label">Observadas</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-autorizacion" style="color:#D97706">—</div><div class="stat-label">Req. autorización</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-declinada" style="color:var(--error)">—</div><div class="stat-label">Declinadas</div></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 id="count-label">Recepciones</h2>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <select id="filtro-estado" class="btn btn-sm" onchange="filtrar()" style="padding:5px 10px">
              <option value="">Todos los estados</option>
              <option value="conforme">Conforme</option>
              <option value="parcial">Parcial</option>
              <option value="parcial_cerrada">Parcial cerrada</option>
              <option value="pendiente">Pendiente</option>
              <option value="observada">Observada</option>
              <option value="declinada">Declinada</option>
            </select>
            <select id="filtro-autorizacion" class="btn btn-sm" onchange="filtrar()" style="padding:5px 10px">
              <option value="">Todos</option>
              <option value="1">Requiere autorización</option>
            </select>
            <div class="search-bar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="search" placeholder="Buscar por número, proveedor..." oninput="filtrar()" />
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Número OR</th>
                <th>Fecha</th>
                <th>Local</th>
                <th>Proveedor</th>
                <th>OC vinculadas</th>
                <th>Guías</th>
                <th>Estado</th>
                <th>PDF</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="9"><div class="loading">Cargando...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ── MODAL DETALLE OR ── -->
  <div class="modal-overlay hidden" id="modal-detalle">
    <div class="modal" style="max-width:900px">
      <div class="modal-header">
        <h3 id="det-titulo">Detalle OR</h3>
        <button class="modal-close" onclick="cerrarDetalle()">×</button>
      </div>
      <div class="modal-body" id="det-body"></div>
      <div class="modal-footer" id="det-footer">
        <button class="btn btn-ghost" onclick="cerrarDetalle()">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    let perfil  = null;
    let ordenes = [];

    async function init() {
      perfil = await requireAuth(['admin','compras','gerencia'], 'compras_recepciones');
      if (!perfil) return;
      renderSidebar(perfil, 'or');
      aplicarPermisosUI(perfil, 'compras_recepciones');
      onContextoChange(async () => { await cargar(); aplicarPermisosUI(perfil, 'compras_recepciones'); });
      if (getContexto().ruc) await cargar();
      else await cargar(); // OR se carga siempre
    }

    let vistaActual = 'compras';

    function setVista(vista) {
      vistaActual = vista;
      ['compras','admin','todas'].forEach(v => {
        document.getElementById(`tab-${v}`).classList.toggle('active', v === vista);
      });
      filtrar();
    }

    async function cargar() {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="9"><div class="loading">Cargando...</div></td></tr>';

      const { ruc } = getContexto();
      let q = sbClient.from('or_cabecera')
        .select('*, or_oc_vinculo(id_oc), locales(nombre), pdf_url, ruc_empresa, id_oc')
        .order('created_at', { ascending: false });
      if (ruc) q = q.eq('ruc_empresa', ruc);

      const { data, error } = await q;
      if (error) {
        document.getElementById('tbody').innerHTML =
          `<tr><td colspan="9"><div class="empty-state"><p>Error: ${error.message}</p></div></td></tr>`;
        return;
      }
      ordenes = data || [];

      document.getElementById('stat-total').textContent       = ordenes.length;
      document.getElementById('stat-conforme').textContent    = ordenes.filter(o => o.estado === 'conforme').length;
      document.getElementById('stat-parciales').textContent   = ordenes.filter(o => o.estado === 'parcial').length;
      document.getElementById('stat-observada').textContent   = ordenes.filter(o => o.estado === 'observada').length;
      document.getElementById('stat-autorizacion').textContent= ordenes.filter(o => o.requiere_autorizacion && !o.autorizado_por).length;
      document.getElementById('stat-declinada').textContent   = ordenes.filter(o => o.estado === 'declinada').length;

      // Badges de tabs
      const paraCompras = ordenes.filter(o =>
        o.estado === 'observada' ||
        o.estado === 'incompleta' ||
        (o.requiere_autorizacion && !o.autorizado_por)
      ).length;
      const paraAdmin = ordenes.filter(o =>
        o.enviada_admin === true ||
        (o.estado === 'conforme' && !o.requiere_autorizacion)
      ).length;
      document.getElementById('badge-compras').textContent = paraCompras;
      document.getElementById('badge-admin').textContent   = paraAdmin;

      filtrar();
    }

    function filtrar() {
      const q      = document.getElementById('search').value.toLowerCase();
      const estado = document.getElementById('filtro-estado').value;
      const auth   = document.getElementById('filtro-autorizacion').value;

      let lista = ordenes.filter(o =>
        (!q      || (o.numero||'').toLowerCase().includes(q) ||
                    (o.nombre_proveedor||'').toLowerCase().includes(q) ||
                    (o.locales?.nombre||'').toLowerCase().includes(q)) &&
        (!estado || o.estado === estado) &&
        (!auth   || (o.requiere_autorizacion && !o.autorizado_por))
      );

      // Filtrar por vista
      if (vistaActual === 'compras') {
        lista = lista.filter(o =>
          o.estado === 'observada' ||
          o.estado === 'incompleta' ||
          (o.requiere_autorizacion && !o.autorizado_por)
        );
      } else if (vistaActual === 'admin') {
        lista = lista.filter(o =>
          o.enviada_admin === true ||
          (o.estado === 'conforme' && !o.requiere_autorizacion)
        );
      }

      document.getElementById('count-label').textContent = `Recepciones (${lista.length})`;
      renderTabla(lista);
    }

    function renderTabla(lista) {
      const tbody = document.getElementById('tbody');
      if (!lista.length) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">
          <h3>Sin recepciones</h3><p>No hay OR para los filtros aplicados.</p>
        </div></td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map(or => {
        const fecha    = or.created_at ? new Date(or.created_at).toLocaleDateString('es-PE') : '—';
        const ocs      = (or.or_oc_vinculo || []).map(v => `<span style="font-family:monospace;font-size:11px">${v.id_oc}</span>`).join('<br>');
        const guias    = (or.guias || []).join(', ') || '—';
        const estadoLabel = { conforme:'conforme', parcial:'parcial', parcial_cerrada:'parcial cerrada', pendiente:'pendiente', observada:'observada', declinada:'declinada' };
        const estadoBadge = `<span class="badge or-badge-${or.estado}" style="font-size:11px">${estadoLabel[or.estado]||or.estado}</span>`;
        const authCell = or.requiere_autorizacion
          ? or.autorizado_por
            ? `<span class="badge badge-green" style="font-size:11px">✓ Autorizado</span>`
            : `<button class="auth-btn" onclick="autorizarOR('${or.id_or}')">Autorizar</button>`
          : '—';

        const rowClass = or.estado === 'observada' ? 'obs-row' : (or.requiere_autorizacion && !or.autorizado_por ? 'exceso-row' : '');
        return `<tr ${rowClass ? `class="${rowClass}"` : ''}>
          <td><strong style="font-family:monospace;font-size:12px">${or.numero || or.id_or}</strong></td>
          <td style="font-size:12px;color:var(--text-muted)">${fecha}</td>
          <td style="font-size:13px">${or.locales?.nombre || or.id_local}</td>
          <td style="font-size:13px"><strong>${or.nombre_proveedor || '—'}</strong></td>
          <td style="font-size:12px">${ocs || '—'}</td>
          <td style="font-size:11px;font-family:monospace;color:var(--text-muted)">${guias}</td>
          <td>${estadoBadge}</td>
          <td>${or.pdf_url
            ? `<a href="${or.pdf_url}" target="_blank" class="btn btn-sm btn-ghost" title="Ver PDF">
                ${icons.download} PDF</a>`
            : '—'}</td>
          <td>
            <button class="btn btn-sm btn-ghost" onclick="verDetalle('${or.id_or}')">
              ${icons.eye} Ver
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    async function verDetalle(idOR) {
      const or = ordenes.find(o => o.id_or === idOR);
      if (!or) return;

      const [{ data: items }, { data: ocs }] = await Promise.all([
        sbClient.from('or_detalle').select('*').eq('id_or', idOR).order('id'),
        sbClient.from('or_oc_vinculo').select('id_oc, ordenes_compra(numero, nombre_proveedor, total)').eq('id_or', idOR),
      ]);

      const fecha     = or.created_at ? new Date(or.created_at).toLocaleString('es-PE') : '—';
      const cerradoAt = or.cerrado_at  ? new Date(or.cerrado_at).toLocaleString('es-PE')  : null;

      document.getElementById('det-titulo').textContent = or.numero || or.id_or;

      const itemsHtml = (items || []).length ? `
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px">Items recibidos</div>
        <div class="table-wrap" style="margin-bottom:1rem">
          <table>
            <thead>
              <tr>
                <th>Descripción</th>
                <th>Unidad</th>
                <th>Cant. OC</th>
                <th>Cant. recibida</th>
                <th>Precio unit.</th>
                <th>Subtotal</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
              ${(items||[]).map(item => {
                const excede = item.excede_limite;
                const pct    = item.cantidad_oc > 0
                  ? ((item.cantidad_recibida / item.cantidad_oc) * 100).toFixed(0) : 0;
                return `<tr ${excede ? 'style="background:#FEF2F2"' : ''}>
                  <td><strong>${item.descripcion}</strong>
                    ${excede ? '<span style="font-size:10px;color:var(--error);margin-left:6px;font-weight:600">⚠ EXCESO</span>' : ''}
                  </td>
                  <td>${item.unidad_medida||'—'}</td>
                  <td style="text-align:right">${item.cantidad_oc}</td>
                  <td style="text-align:right;font-weight:700;color:${excede?'var(--error)':'var(--success)'}">${item.cantidad_recibida} <span style="font-size:11px;color:var(--text-muted)">(${pct}%)</span></td>
                  <td style="text-align:right">S/ ${parseFloat(item.precio_unitario||0).toFixed(2)}</td>
                  <td style="text-align:right;font-weight:600">S/ ${parseFloat(item.subtotal||0).toFixed(2)}</td>
                  <td><span class="badge ${item.estado==='recibido'?'badge-green':item.estado==='rechazado'?'badge-red':'badge-yellow'}">${item.estado}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>` : '<p style="color:var(--text-muted);font-size:13px;margin-bottom:1rem">Sin ítems registrados.</p>';

      const ocsHtml = (ocs||[]).length ? `
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px">OC vinculadas</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
          ${(ocs||[]).map(v => `
            <div style="background:var(--navy-light,#EEF2FB);border-radius:var(--radius-md);padding:8px 14px;font-size:13px">
              <div style="font-family:monospace;font-weight:700">${v.id_oc}</div>
              <div style="font-size:12px;color:var(--text-muted)">${v.ordenes_compra?.nombre_proveedor||'—'} · S/ ${parseFloat(v.ordenes_compra?.total||0).toFixed(2)}</div>
            </div>`).join('')}
        </div>` : '';

      document.getElementById('det-body').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.25rem;background:var(--bg);border-radius:var(--radius-md);padding:1rem">
          ${df('Proveedor', or.nombre_proveedor||'—')}
          ${df('Local', or.locales?.nombre||or.id_local)}
          ${df('Estado', `<span class="badge or-badge-${or.estado}">${or.estado.replace('_',' ')}</span>`)}
          ${df('Fecha recepción', fecha)}
          ${df('Guías', (or.guias||[]).join(', ')||'—')}
          ${df('Autorización', or.requiere_autorizacion ? (or.autorizado_por ? '✓ Autorizado' : '⚠ Pendiente') : 'No requerida')}
          ${or.observacion_local ? df('Observación del local', `<span style="color:var(--warning)">${or.observacion_local}</span>`) : ''}
          ${cerradoAt ? df('Cerrado', cerradoAt) : ''}
        </div>
        ${or.estado === 'observada' ? `
          <div class="alert alert-warning" style="margin-bottom:1rem">
            <strong>⚠ OR Observada</strong> — ${or.observacion_local||'Sin detalle'}
            <div style="margin-top:8px;display:flex;gap:8px">
              <button class="btn btn-sm btn-primary" onclick="aprobarObservada('${or.id_or}')">✓ Aprobar y enviar a Administración</button>
              <button class="btn btn-sm btn-ghost" style="color:var(--error)" onclick="rechazarObservada('${or.id_or}')">✗ Rechazar — devolver a local</button>
            </div>
          </div>` : ''}
        ${or.estado === 'incompleta' ? `
          <div class="alert" style="background:#EDE9FE;border-left:4px solid #7C3AED;margin-bottom:1rem">
            <strong style="color:#5B21B6">📋 OR Incompleta</strong> — Algunos ítems no fueron entregados.
            <div style="font-size:13px;color:#6D28D9;margin-top:4px">Revisá los ítems rechazados y decidí si generás una nueva OC para reposición.</div>
            <div style="margin-top:10px;display:flex;gap:8px">
              <button class="btn btn-sm btn-primary" onclick="aprobarIncompleta('${or.id_or}')">✓ Aprobar y enviar a Administración</button>
            </div>
          </div>` : ''}
        ${ocsHtml}
        ${itemsHtml}
      `;

      // Footer con botón autorizar si aplica
      const footer = document.getElementById('det-footer');
      if (or.requiere_autorizacion && !or.autorizado_por && puedeEditar(perfil,'compras_recepciones')) {
        footer.innerHTML = `
          <button class="btn btn-ghost" onclick="cerrarDetalle()">Cerrar</button>
          <button class="auth-btn" style="padding:10px 20px;font-size:14px" onclick="autorizarOR('${or.id_or}')">
            Autorizar exceso de cantidad
          </button>`;
      } else {
        footer.innerHTML = '<button class="btn btn-ghost" onclick="cerrarDetalle()">Cerrar</button>';
      }
      // Botón PDF — generar si no existe, ver si ya existe
      if (or.pdf_url) {
        footer.innerHTML += `<a href="${or.pdf_url}" target="_blank" class="btn btn-outline">
          ${icons.download} Ver PDF</a>`;
      } else if (['conforme','incompleta','declinada'].includes(or.estado)) {
        footer.innerHTML += `<button class="btn btn-primary" onclick="generarYSubirPDF_OR('${or.id_or}')">
          ${icons.download} Generar PDF</button>`;
      }

      document.getElementById('modal-detalle').classList.remove('hidden');
    }

    async function autorizarOR(idOR) {
      if (!confirm('¿Confirmás la autorización del exceso de cantidad para esta OR?')) return;
      const { error } = await sbClient.from('or_cabecera').update({
        autorizado_por: perfil.user_id,
        autorizado_at:  new Date().toISOString(),
      }).eq('id_or', idOR);

      if (error) { alert('Error: ' + error.message); return; }

      // También marcar los ítems con exceso como recibidos
      await sbClient.from('or_detalle').update({ estado: 'recibido' })
        .eq('id_or', idOR).eq('excede_limite', true);

      // Recalcular estado OC
      const or = ordenes.find(o => o.id_or === idOR);
      for (const v of or?.or_oc_vinculo || []) {
        await sbClient.rpc('actualizar_estado_oc_por_or', { p_id_oc: v.id_oc });
      }

      await auditar(perfil, 'EDITAR', 'or_cabecera', `Autorizó exceso OR ${idOR}`);
      cerrarDetalle();
      await cargar();
    }

    function df(label, val) {
      return `<div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">${label}</div>
        <div style="font-size:13px;font-weight:500">${val||'—'}</div>
      </div>`;
    }

    async function aprobarObservada(idOR) {
      if (!confirm('¿Confirmás que la OR observada puede pasar a Administración?')) return;
      const { error } = await sbClient.from('or_cabecera').update({
        estado:          'conforme',
        enviada_admin:   true,
        enviada_admin_at: new Date().toISOString(),
      }).eq('id_or', idOR);
      if (error) { alert('Error: ' + error.message); return; }
      await auditar(perfil, 'EDITAR', 'or_cabecera', `Aprobó OR observada ${idOR} → envió a Administración`);
      cerrarDetalle();
      await cargar();
    }

    async function aprobarIncompleta(idOR) {
      if (!confirm('¿Confirmás que esta OR puede pasar a Administración con los ítems faltantes?')) return;
      const { error } = await sbClient.from('or_cabecera').update({
        estado:           'conforme',
        enviada_admin:    true,
        enviada_admin_at: new Date().toISOString(),
      }).eq('id_or', idOR);
      if (error) { alert('Error: ' + error.message); return; }
      await auditar(perfil, 'EDITAR', 'or_cabecera', `Aprobó OR incompleta ${idOR} → envió a Administración`);
      cerrarDetalle();
      await cargar();
    }

    async function rechazarObservada(idOR) {
      const motivo = prompt('Motivo del rechazo (se notificará al local):');
      if (motivo === null) return;
      const { error } = await sbClient.from('or_cabecera').update({
        estado:           'declinada',
        observacion_local: motivo,
      }).eq('id_or', idOR);
      if (error) { alert('Error: ' + error.message); return; }
      await auditar(perfil, 'EDITAR', 'or_cabecera', `Rechazó OR observada ${idOR}`);
      cerrarDetalle();
      await cargar();
    }

    function base64ToBlob(base64, mimeType) {
      const bytes = atob(base64);
      const arr   = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      return new Blob([arr], { type: mimeType });
    }

    async function generarYSubirPDF_OR(idOR) {
      const or = ordenes.find(o => o.id_or === idOR);
      if (!or) return;

      const { data: items } = await sbClient.from('or_detalle').select('*').eq('id_or', idOR).order('id');
      const { data: ocData } = await sbClient.from('ordenes_compra').select('nombre_proveedor, ruc_empresa, id_local, locales(nombre, direccion)').eq('id_oc', or.id_oc).single();

      const { jsPDF } = window.jspdf;
      const doc   = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      const mL    = 14, mR = 196, ancho = 182;
      const azul  = [27,43,94], negro = [30,30,30], gris = [120,120,120], grisCla = [210,215,225], blanco = [255,255,255];
      const fmt2  = n => parseFloat(n||0).toLocaleString('en-US', { minimumFractionDigits:2 });
      const fecha = new Date(or.created_at).toLocaleDateString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric' });

      // ── CABECERA ─────────────────────────────────────────────────
      doc.setFillColor(...azul);
      doc.rect(0, 0, 210, 28, 'F');

      doc.setFont('helvetica','bold').setFontSize(13).setTextColor(...blanco);
      doc.text('ORDEN DE RECEPCIÓN', 105, 11, { align:'center' });
      doc.setFont('helvetica','normal').setFontSize(9).setTextColor(180,200,240);
      doc.text(or.id_or, 105, 18, { align:'center' });

      // Caja número
      doc.setFillColor(...blanco);
      doc.roundedRect(148, 3, 46, 22, 2, 2, 'F');
      doc.setFont('helvetica','normal').setFontSize(6.5).setTextColor(...azul);
      doc.text('NÚMERO OR:', 171, 9, { align:'center' });
      doc.setFont('helvetica','bold').setFontSize(8.5).setTextColor(...azul);
      doc.text(or.id_or, 171, 16, { align:'center' });
      doc.setFont('helvetica','normal').setFontSize(6.5).setTextColor(...gris);
      doc.text(`Fecha: ${fecha}`, 171, 22, { align:'center' });

      let y = 34;

      // ── INFO GENERAL ─────────────────────────────────────────────
      doc.setFillColor(244,247,252);
      doc.roundedRect(mL, y-3, ancho, 18, 1.5, 1.5, 'F');

      doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...azul);
      doc.text('PROVEEDOR:', mL+3, y+3);
      doc.setFont('helvetica','bold').setFontSize(9).setTextColor(0,90,0);
      doc.text(or.nombre_proveedor || '—', mL+30, y+3);

      doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...azul);
      doc.text('LOCAL:', mL+3, y+10);
      doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...negro);
      doc.text(or.locales?.nombre || or.id_local || '—', mL+18, y+10);

      doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...azul);
      doc.text('OC:', mR-60, y+3);
      doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...negro);
      doc.text(or.id_oc || '—', mR-52, y+3);

      doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...azul);
      doc.text('Guías:', mR-60, y+10);
      doc.setFont('helvetica','normal').setFontSize(7.5).setTextColor(...negro);
      doc.text((or.guias||[]).join(', ') || '—', mR-43, y+10);

      // Estado badge
      const estadoColors = { conforme:[0,120,0], incompleta:[100,30,200], declinada:[180,0,0], parcial:[180,120,0] };
      const estadoColor = estadoColors[or.estado] || negro;
      doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...estadoColor);
      doc.text(`Estado: ${or.estado.toUpperCase()}`, mR-3, y+3, { align:'right' });

      y += 22;

      // ── TABLA DE ITEMS ────────────────────────────────────────────
      const colW = [7, 57, 15, 18, 18, 18, 18, 18, 13];
      const colX = [mL];
      colW.forEach((w,i) => { if(i>0) colX.push(colX[i-1]+colW[i-1]); });
      const headers = ['N°','Descripción','Unid','Cant OC','Cant Rec','Precio','Subtotal','Estado'];

      doc.setFillColor(...azul);
      doc.rect(mL, y, ancho, 7, 'F');
      doc.setFont('helvetica','bold').setFontSize(7).setTextColor(...blanco);
      ['N°','Descripción','Unid','Cant. OC','Cant. Rec.','P.Unit','Subtotal','Estado'].forEach((h,i) => {
        const isRight = i >= 3 && i <= 6;
        const xPos = isRight ? colX[i]+colW[i]-1 : i===0 ? colX[i]+colW[i]/2 : colX[i]+1.5;
        doc.text(h, xPos, y+4.8, { align: isRight?'right':i===0?'center':'left' });
      });
      y += 7;

      doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...negro);
      (items||[]).forEach((item, idx) => {
        const rowH = 8;
        if (y + rowH > 265) { doc.addPage(); y = 15; }
        if (idx % 2 === 1) { doc.setFillColor(248,250,254); doc.rect(mL,y,ancho,rowH,'F'); }
        doc.setDrawColor(...grisCla).setLineWidth(0.15);
        doc.line(mL, y+rowH, mR, y+rowH);

        const cy = y + rowH/2 + 1;
        const estadoItem = item.estado || 'pendiente';
        const colEstado = estadoItem==='recibido'?[0,120,0]:estadoItem==='rechazado'?[180,0,0]:[150,100,0];

        doc.setTextColor(...negro);
        doc.text((idx+1).toString(), colX[0]+colW[0]/2, cy, {align:'center'});
        doc.text((item.descripcion||'').slice(0,30), colX[1]+1.5, cy);
        doc.text(item.unidad_medida||'—', colX[2]+1.5, cy);
        doc.text(fmt2(item.cantidad_oc), colX[3]+colW[3]-1, cy, {align:'right'});
        doc.setFont('helvetica','bold');
        doc.text(fmt2(item.cantidad_recibida), colX[4]+colW[4]-1, cy, {align:'right'});
        doc.setFont('helvetica','normal');
        doc.text('S/'+fmt2(item.precio_unitario), colX[5]+colW[5]-1, cy, {align:'right'});
        doc.text('S/'+fmt2(item.subtotal), colX[6]+colW[6]-1, cy, {align:'right'});
        doc.setFont('helvetica','bold').setTextColor(...colEstado);
        doc.text(estadoItem, colX[7]+colW[7]/2, cy, {align:'center'});
        doc.setFont('helvetica','normal').setTextColor(...negro);
        y += rowH;
      });

      y += 8;

      // ── OBSERVACIÓN ──────────────────────────────────────────────
      if (or.observacion_local) {
        doc.setFillColor(255,252,230);
        const obsLines = doc.splitTextToSize(or.observacion_local, ancho-6);
        doc.roundedRect(mL, y-3, ancho, obsLines.length*4.5+8, 1.5, 1.5, 'F');
        doc.setFont('helvetica','bold').setFontSize(7.5).setTextColor(140,100,0);
        doc.text('Observación:', mL+3, y+2);
        doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...negro);
        doc.text(obsLines, mL+3, y+7);
        y += obsLines.length*4.5+12;
      }

      // ── PIE ──────────────────────────────────────────────────────
      const pieY = 287;
      doc.setFillColor(...azul);
      doc.rect(0, pieY, 210, 10, 'F');
      doc.setFont('helvetica','bold').setFontSize(7).setTextColor(...blanco);
      doc.text('MPCS · Sistema de Gestión', mL, pieY+4);
      doc.setFont('helvetica','normal').setFontSize(6.5).setTextColor(180,200,240);
      doc.text(`gestion.mpcs.pe  ·  ${fecha}`, mL, pieY+8);
      doc.setFont('helvetica','normal').setFontSize(6.5).setTextColor(180,200,240);
      doc.text(`Generado por: ${perfil?.nombre || '—'}`, mR, pieY+4, { align:'right' });

      const pdfBase64 = doc.output('datauristring').split(',')[1];

      // Subir a Storage
      const pdfBlob = base64ToBlob(pdfBase64, 'application/pdf');
      const pathPDF = `${or.ruc_empresa || 'SIN-RUC'}/${or.id_or}.pdf`;
      const { error: eStorage } = await sbClient.storage
        .from('ordenes-compra')
        .upload(pathPDF, pdfBlob, { contentType:'application/pdf', upsert:true });

      if (eStorage) {
        alert('Error al subir PDF: ' + eStorage.message);
        return;
      }

      const { data: urlData } = await sbClient.storage
        .from('ordenes-compra')
        .createSignedUrl(pathPDF, 60 * 60 * 24 * 365);

      const pdfUrl = urlData?.signedUrl || null;

      if (pdfUrl) {
        await sbClient.from('or_cabecera').update({ pdf_url: pdfUrl }).eq('id_or', idOR);
        // Actualizar en memoria
        const idx = ordenes.findIndex(o => o.id_or === idOR);
        if (idx >= 0) ordenes[idx].pdf_url = pdfUrl;
        // Abrir en nueva pestaña
        window.open(pdfUrl, '_blank');
        cerrarDetalle();
        await cargar();
      }
    }

    function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }

    document.getElementById('modal-detalle').addEventListener('click', function(e) {
      if (e.target === this) cerrarDetalle();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarDetalle(); });

    init();
  </script>
</body>
</html>
