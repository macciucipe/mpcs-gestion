<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planilla · MPC Gestión</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .concepto-row { display:grid; grid-template-columns:1fr 120px; gap:8px; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); }
    .concepto-row:last-child { border-bottom:none; }
    .concepto-label { font-size:13px; }
    .concepto-input { font-size:13px; padding:5px 8px; border:1px solid var(--border-md); border-radius:var(--radius-md); text-align:right; width:100%; }
    .concepto-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(46,77,176,0.1); }
    .concepto-total { font-size:13px; font-weight:600; text-align:right; }
    .section-header { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); padding:8px 0 4px; border-bottom:2px solid var(--navy-light); margin-bottom:4px; }
    .resumen-box { background:var(--navy-light); border-radius:var(--radius-lg); padding:1.25rem; }
    .resumen-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:13px; border-bottom:1px solid rgba(0,0,0,0.06); }
    .resumen-row:last-child { border-bottom:none; font-weight:700; font-size:15px; }
    .emp-card { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--white); border:1px solid var(--border); border-radius:var(--radius-md); cursor:pointer; transition:all 0.15s; margin-bottom:8px; }
    .emp-card:hover { border-color:var(--navy); background:var(--navy-light); }
    .emp-card.selected { border-color:var(--navy); background:var(--navy-light); }
    .emp-avatar { width:36px; height:36px; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
    .emp-info { flex:1; }
    .emp-name { font-size:13px; font-weight:500; }
    .emp-cargo { font-size:12px; color:var(--text-muted); }
    .emp-neto { font-size:13px; font-weight:600; color:var(--success); }
  </style>
</head>
<body class="portal-layout">
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Planilla</h1>
        <p>Cálculo y emisión de boletas de pago</p>
      </div>
      <div class="page-header-right">
        <button class="btn btn-primary" onclick="openNuevoPeriodo()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nuevo período
        </button>
      </div>
    </div>

    <div class="page-body">
      <!-- Vista lista de períodos -->
      <div id="vista-lista">
        <div class="card">
          <div class="card-header">
            <h2 id="periodos-label">Períodos</h2>
            <select id="filtro-empresa-plan" class="btn btn-sm" onchange="loadPeriodos()" style="padding:5px 10px">
              <option value="">Todas las empresas</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Período</th>
                  <th>Empresa</th>
                  <th>Empleados</th>
                  <th>Total neto</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tbody-periodos">
                <tr><td colspan="6"><div class="loading">Cargando...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Vista detalle período -->
      <div id="vista-detalle" style="display:none">
        <div style="display:flex;gap:1.5rem">
          <!-- Lista empleados -->
          <div style="width:280px;flex-shrink:0">
            <div class="card">
              <div class="card-header">
                <h2 id="periodo-titulo">Empleados</h2>
              </div>
              <div style="padding:12px" id="lista-empleados"></div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="volverLista()" style="margin-top:8px;width:100%;justify-content:center">
              ← Volver a períodos
            </button>
          </div>

          <!-- Formulario empleado -->
          <div style="flex:1" id="panel-empleado">
            <div class="empty-state" style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:3rem">
              <p>Seleccioná un empleado para cargar su planilla</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal nuevo período -->
  <div class="modal-overlay hidden" id="modal-periodo">
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <h3>Nuevo período de planilla</h3>
        <button class="modal-close" onclick="closeModal('modal-periodo')">×</button>
      </div>
      <div class="modal-body">
        <div id="modal-error" class="alert alert-error" style="display:none"></div>
        <div class="form-grid">
          <div class="field">
            <label>Empresa <span class="req">*</span></label>
            <select id="np-empresa"><option value="">Seleccionar...</option></select>
          </div>
          <div class="field">
            <label>Mes <span class="req">*</span></label>
            <select id="np-mes">
              <option value="1">Enero</option><option value="2">Febrero</option>
              <option value="3">Marzo</option><option value="4">Abril</option>
              <option value="5">Mayo</option><option value="6">Junio</option>
              <option value="7">Julio</option><option value="8">Agosto</option>
              <option value="9">Septiembre</option><option value="10">Octubre</option>
              <option value="11">Noviembre</option><option value="12">Diciembre</option>
            </select>
          </div>
          <div class="field">
            <label>Año <span class="req">*</span></label>
            <input type="number" id="np-anio" value="2026" min="2020" max="2030" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-periodo')">Cancelar</button>
        <button class="btn btn-primary" onclick="crearPeriodo()">Crear período</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const AFP_RATES = { PROFUTURO:{oblig:0.10,comision:0.0155,seguro:0.0137}, PRIMA:{oblig:0.10,comision:0.0000,seguro:0.0137}, HABITAT:{oblig:0.10,comision:0.0000,seguro:0.0137}, INTEGRA:{oblig:0.10,comision:0.0155,seguro:0.0137} };
    const SNP_RATE  = 0.13;
    const ESSALUD_RATE = 0.09;

    let perfil = null, periodos = [], currentPeriodo = null, empleados = [], currentEmpleado = null;

    async function init() {
      perfil = await requireAuth(['admin','rrhh','gerencia']);
      if (!perfil) return;
      renderSidebar(perfil, 'planilla');
      await loadEmpresas();
      await loadPeriodos();
    }

    async function loadEmpresas() {
      const { data } = await sbClient.from('empresas').select('ruc, razon_social, abreviatura').eq('estado','activa').order('razon_social');
      const sels = [document.getElementById('filtro-empresa-plan'), document.getElementById('np-empresa')];
      (data||[]).forEach(e => {
        sels.forEach(sel => {
          const o = document.createElement('option'); o.value = e.ruc;
          o.textContent = `${e.abreviatura} — ${e.razon_social}`; sel.appendChild(o);
        });
      });
      if (perfil.ruc_empresa) {
        document.getElementById('filtro-empresa-plan').value = perfil.ruc_empresa;
        document.getElementById('np-empresa').value = perfil.ruc_empresa;
      }
    }

    async function loadPeriodos() {
      const empresa = document.getElementById('filtro-empresa-plan').value || perfil.ruc_empresa;
      let q = sbClient.from('planilla_periodos').select('*, empresas(razon_social,abreviatura)').order('anio',{ascending:false}).order('mes',{ascending:false});
      if (empresa) q = q.eq('ruc_empresa', empresa);
      const { data } = await q;
      periodos = data || [];
      document.getElementById('periodos-label').textContent = `Períodos (${periodos.length})`;
      renderPeriodos();
    }

    function renderPeriodos() {
      const tbody = document.getElementById('tbody-periodos');
      if (!periodos.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>No hay períodos creados</p></div></td></tr>'; return; }
      tbody.innerHTML = periodos.map(p => `
        <tr>
          <td style="font-weight:600">${MESES[p.mes]} ${p.anio}</td>
          <td><span class="badge badge-blue">${p.empresas?.abreviatura||'—'}</span></td>
          <td id="emp-count-${p.id}">—</td>
          <td id="neto-count-${p.id}" style="font-weight:600;color:var(--success)">—</td>
          <td>${p.estado==='cerrado'?'<span class="badge badge-green">Cerrado</span>':'<span class="badge badge-yellow">Borrador</span>'}</td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm btn-ghost" onclick="abrirPeriodo(${p.id})">✏️ Cargar</button>
              ${p.estado==='borrador'?`<button class="btn btn-sm btn-ghost" onclick="cerrarPeriodo(${p.id})">🔒 Cerrar</button>`:''}
              <button class="btn btn-sm btn-ghost" onclick="generarTodasBoletas(${p.id})">📄 Boletas</button>
            </div>
          </td>
        </tr>
      `).join('');
      periodos.forEach(p => loadPeriodoStats(p.id));
    }

    async function loadPeriodoStats(periodoId) {
      const { data } = await sbClient.from('planilla_detalle').select('neto_pagar').eq('periodo_id', periodoId);
      if (!data) return;
      document.getElementById(`emp-count-${periodoId}`).textContent = data.length;
      const total = data.reduce((s,d) => s + (d.neto_pagar||0), 0);
      document.getElementById(`neto-count-${periodoId}`).textContent = `S/ ${total.toLocaleString('es-PE',{minimumFractionDigits:2})}`;
    }

    async function abrirPeriodo(id) {
      currentPeriodo = periodos.find(p => p.id === id);
      document.getElementById('periodo-titulo').textContent = `${MESES[currentPeriodo.mes]} ${currentPeriodo.anio}`;
      document.getElementById('vista-lista').style.display = 'none';
      document.getElementById('vista-detalle').style.display = 'block';
      await loadEmpleadosPeriodo();
    }

    async function loadEmpleadosPeriodo() {
      const { data } = await sbClient.from('empleados').select('id_empleado, nombres, apellidos, cargo, sueldo_basico, asignacion_familiar, sistema_pensionario, afp, cuspp, regimen, tipo_documento, numero_documento, ruc_empresa, empresas(razon_social,abreviatura), locales(nombre), datos_extra').eq('ruc_empresa', currentPeriodo.ruc_empresa).eq('estado','activo').order('apellidos');
      empleados = data || [];

      // Cargar detalles ya cargados
      const { data: detalles } = await sbClient.from('planilla_detalle').select('*').eq('periodo_id', currentPeriodo.id);
      const detalleMap = {};
      (detalles||[]).forEach(d => detalleMap[d.id_empleado] = d);

      const lista = document.getElementById('lista-empleados');
      lista.innerHTML = empleados.map(e => {
        const det = detalleMap[e.id_empleado];
        const ini = `${(e.nombres||'')[0]||''}${(e.apellidos||'')[0]||''}`.toUpperCase();
        return `<div class="emp-card" id="emp-card-${e.id_empleado}" onclick="selectEmpleado('${e.id_empleado}')">
          <div class="emp-avatar">${ini}</div>
          <div class="emp-info">
            <div class="emp-name">${e.nombres} ${e.apellidos}</div>
            <div class="emp-cargo">${e.cargo||'—'}</div>
          </div>
          ${det ? `<div class="emp-neto">S/${Number(det.neto_pagar).toFixed(0)}</div>` : '<div style="font-size:11px;color:var(--text-muted)">Pendiente</div>'}
        </div>`;
      }).join('');
    }

    async function selectEmpleado(id) {
      document.querySelectorAll('.emp-card').forEach(c => c.classList.remove('selected'));
      document.getElementById(`emp-card-${id}`)?.classList.add('selected');
      currentEmpleado = empleados.find(e => e.id_empleado === id);
      const extra = currentEmpleado.datos_extra ? JSON.parse(currentEmpleado.datos_extra) : {};

      // Cargar detalle existente
      const { data: det } = await sbClient.from('planilla_detalle').select('*').eq('periodo_id', currentPeriodo.id).eq('id_empleado', id).maybeSingle();

      renderFormEmpleado(currentEmpleado, extra, det);
    }

    function renderFormEmpleado(e, extra, det) {
      const d = det || {};
      const panel = document.getElementById('panel-empleado');
      panel.innerHTML = `
        <div class="card">
          <div class="card-header" style="background:var(--navy);border-radius:var(--radius-lg) var(--radius-lg) 0 0">
            <div>
              <h2 style="color:#fff">${e.nombres} ${e.apellidos}</h2>
              <div style="font-size:12px;color:rgba(255,255,255,0.6)">${e.cargo||'—'} · ${e.tipo_documento} ${e.numero_documento}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:rgba(255,255,255,0.5)">Sueldo base</div>
              <div style="font-size:18px;font-weight:700;color:#fff">S/ ${Number(e.sueldo_basico||0).toLocaleString('es-PE')}</div>
            </div>
          </div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5rem">
              <!-- Días -->
              <div>
                <div class="section-header">Días</div>
                ${concepto('Días laborados','dias_laborados', d.dias_laborados??30)}
                ${concepto('Feriados','dias_feriados', d.dias_feriados??0)}
                ${concepto('Días subsidiados','dias_subsidiados', d.dias_subsidiados??0)}

                <div class="section-header" style="margin-top:12px">Bonos</div>
                ${concepto('Bono día trabajador','bono_dia_trabajador', d.bono_dia_trabajador??0)}
                ${concepto('Movilidad fija','movilidad', d.movilidad??0)}
                ${concepto('Bono antigüedad','bono_antiguedad', d.bono_antiguedad??0)}
                ${concepto('Bono puntualidad','bono_puntualidad', d.bono_puntualidad??0)}
                ${concepto('Asistencia perfecta','bono_asistencia', d.bono_asistencia??0)}
                ${concepto('Buen desempeño','bono_desempeno', d.bono_desempeno??0)}
                ${concepto('Bono excepcional','bono_excepcional', d.bono_excepcional??0)}
                ${concepto('Aguinaldo','aguinaldo', d.aguinaldo??0)}
              </div>

              <!-- Horas extras y truncos -->
              <div>
                <div class="section-header">Horas extras</div>
                ${concepto('HE 25%','horas_extras_25', d.horas_extras_25??0)}
                ${concepto('HE 35%','horas_extras_35', d.horas_extras_35??0)}

                <div class="section-header" style="margin-top:12px">Truncos y otros</div>
                ${concepto('CTS trunco','cts_trunco', d.cts_trunco??0)}
                ${concepto('Grat. trunca','grat_trunca', d.grat_trunca??0)}
                ${concepto('Grat. EsSalud trunco','grat_essalud_trunco', d.grat_essalud_trunco??0)}
                ${concepto('Vacaciones truncas','vacaciones_truncas', d.vacaciones_truncas??0)}
                ${concepto('Vacaciones gozadas','vacaciones_gozadas', d.vacaciones_gozadas??0)}
                ${concepto('Otros ingresos','otros_ingresos', d.otros_ingresos??0)}
              </div>

              <!-- Descuentos -->
              <div>
                <div class="section-header">Descuentos</div>
                ${concepto('Faltas (días)','faltas', d.faltas??0)}
                ${concepto('Tardanzas (S/)','tardanzas', d.tardanzas??0)}
                ${concepto('Adelanto','adelanto', d.adelanto??0)}
                ${concepto('Otros descuentos','otros_descuentos', d.otros_descuentos??0)}

                <div class="section-header" style="margin-top:12px">Resumen</div>
                <div class="resumen-box">
                  <div class="resumen-row"><span>Total ingresos</span><span id="r-ingresos" style="color:var(--success)">S/ 0.00</span></div>
                  <div class="resumen-row"><span>AFP / SNP</span><span id="r-afp" style="color:var(--error)">S/ 0.00</span></div>
                  <div class="resumen-row"><span>Total descuentos</span><span id="r-descuentos" style="color:var(--error)">S/ 0.00</span></div>
                  <div class="resumen-row"><span>EsSalud (empleador)</span><span id="r-essalud">S/ 0.00</span></div>
                  <div class="resumen-row"><span>NETO A PAGAR</span><span id="r-neto" style="color:var(--navy)">S/ 0.00</span></div>
                </div>

                <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
                  <button class="btn btn-primary" onclick="calcular()">🔄 Calcular</button>
                  <button class="btn btn-primary" onclick="guardarDetalle()" style="background:var(--success);border-color:var(--success)">💾 Guardar</button>
                  <button class="btn" onclick="generarBoleta()" id="btn-boleta">📄 Generar boleta PDF</button>
                </div>
              </div>
            </div>
          </div>
        </div>`;

      // Auto-calcular si hay datos previos
      if (det) calcular();
    }

    function concepto(label, field, value) {
      return `<div class="concepto-row">
        <label class="concepto-label">${label}</label>
        <input class="concepto-input" type="number" id="f-${field}" value="${value||0}" step="0.01" min="0" oninput="calcular()" />
      </div>`;
    }

    function getVal(id) { return parseFloat(document.getElementById(id)?.value||0)||0; }

    function calcular() {
      if (!currentEmpleado) return;
      const e = currentEmpleado;
      const sueldo = e.sueldo_basico || 0;
      const asigFam = e.asignacion_familiar || 0;
      const diasLab = getVal('f-dias_laborados');
      const diasMes = 30;

      // Remuneración proporcional
      const remunProp = (sueldo / diasMes) * diasLab;
      const asigProp  = diasLab >= diasMes ? asigFam : 0;

      // Horas extras
      const he25 = getVal('f-horas_extras_25');
      const he35 = getVal('f-horas_extras_35');

      // Bonos e ingresos variables
      const bonos = ['bono_dia_trabajador','movilidad','bono_antiguedad','bono_puntualidad','bono_asistencia','bono_desempeno','bono_excepcional','aguinaldo','cts_trunco','grat_trunca','grat_essalud_trunco','vacaciones_truncas','vacaciones_gozadas','otros_ingresos'].reduce((s,f)=>s+getVal('f-'+f),0);

      const totalIngresos = remunProp + asigProp + he25 + he35 + bonos;

      // Descuentos
      const faltas   = (sueldo / diasMes) * getVal('f-faltas');
      const tardanzas= getVal('f-tardanzas');
      const adelanto = getVal('f-adelanto');
      const otrosDsc = getVal('f-otros_descuentos');

      // AFP / SNP
      let afpObl = 0, afpCom = 0, afpSeg = 0, snp = 0;
      const pension = e.sistema_pensionario;
      if (pension === 'ONP') {
        snp = remunProp * SNP_RATE;
      } else if (pension === 'AFP' && e.afp) {
        const rates = AFP_RATES[e.afp] || AFP_RATES['PRIMA'];
        afpObl = remunProp * rates.oblig;
        afpCom = remunProp * rates.comision;
        afpSeg = remunProp * rates.seguro;
      }

      const totalAfpSnp   = afpObl + afpCom + afpSeg + snp;
      const totalDescuentos = faltas + tardanzas + adelanto + otrosDsc + totalAfpSnp;
      const neto = totalIngresos - totalDescuentos;
      const essalud = remunProp * ESSALUD_RATE;

      document.getElementById('r-ingresos').textContent  = `S/ ${totalIngresos.toFixed(2)}`;
      document.getElementById('r-afp').textContent       = `S/ ${totalAfpSnp.toFixed(2)}`;
      document.getElementById('r-descuentos').textContent= `S/ ${totalDescuentos.toFixed(2)}`;
      document.getElementById('r-essalud').textContent   = `S/ ${essalud.toFixed(2)}`;
      document.getElementById('r-neto').textContent      = `S/ ${neto.toFixed(2)}`;

      // Guardar en memoria para usar al guardar
      window._calc = { totalIngresos, totalDescuentos, neto, essalud, afpObl, afpCom, afpSeg, snp };
    }

    async function guardarDetalle() {
      if (!currentEmpleado || !window._calc) { calcular(); }
      const c = window._calc || {};
      const payload = {
        periodo_id: currentPeriodo.id,
        id_empleado: currentEmpleado.id_empleado,
        dias_laborados:     getVal('f-dias_laborados'),
        dias_feriados:      getVal('f-dias_feriados'),
        dias_subsidiados:   getVal('f-dias_subsidiados'),
        horas_extras_25:    getVal('f-horas_extras_25'),
        horas_extras_35:    getVal('f-horas_extras_35'),
        bono_dia_trabajador:getVal('f-bono_dia_trabajador'),
        movilidad:          getVal('f-movilidad'),
        bono_antiguedad:    getVal('f-bono_antiguedad'),
        bono_puntualidad:   getVal('f-bono_puntualidad'),
        bono_asistencia:    getVal('f-bono_asistencia'),
        bono_desempeno:     getVal('f-bono_desempeno'),
        bono_excepcional:   getVal('f-bono_excepcional'),
        aguinaldo:          getVal('f-aguinaldo'),
        cts_trunco:         getVal('f-cts_trunco'),
        grat_trunca:        getVal('f-grat_trunca'),
        grat_essalud_trunco:getVal('f-grat_essalud_trunco'),
        vacaciones_truncas: getVal('f-vacaciones_truncas'),
        vacaciones_gozadas: getVal('f-vacaciones_gozadas'),
        otros_ingresos:     getVal('f-otros_ingresos'),
        faltas:             getVal('f-faltas'),
        tardanzas:          getVal('f-tardanzas'),
        adelanto:           getVal('f-adelanto'),
        otros_descuentos:   getVal('f-otros_descuentos'),
        total_ingresos:     c.totalIngresos||0,
        total_descuentos:   c.totalDescuentos||0,
        neto_pagar:         c.neto||0,
        essalud:            c.essalud||0,
        afp_obligatorio:    c.afpObl||0,
        afp_comision:       c.afpCom||0,
        afp_seguro:         c.afpSeg||0,
        snp:                c.snp||0,
      };
      const { error } = await sbClient.from('planilla_detalle').upsert([payload], { onConflict: 'periodo_id,id_empleado' });
      if (!error) {
        alert('✅ Datos guardados');
        await loadEmpleadosPeriodo();
        document.getElementById(`emp-card-${currentEmpleado.id_empleado}`)?.classList.add('selected');
      } else {
        alert('Error: ' + error.message);
      }
    }

    async function generarBoleta() {
      if (!currentEmpleado || !window._calc) { calcular(); }
      const e   = currentEmpleado;
      const c   = window._calc;
      const p   = currentPeriodo;
      const extra = e.datos_extra ? JSON.parse(e.datos_extra) : {};

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4' });
      const W = 210, M = 14;

      function line(y) { doc.setDrawColor(200); doc.line(M, y, W-M, y); }
      function box(x,y,w,h,fill) { if(fill){ doc.setFillColor(fill); doc.rect(x,y,w,h,'F'); } else { doc.rect(x,y,w,h); } }
      function txt(text, x, y, size=10, bold=false, align='left') {
        doc.setFontSize(size); doc.setFont('helvetica', bold?'bold':'normal');
        doc.text(String(text||''), x, y, {align});
      }

      // ── COPIA EMPLEADOR ──
      let y = 15;
      box(M, y, W-2*M, 8, [27,43,94]);
      txt('COPIA EMPLEADOR', W/2, y+5.5, 9, true, 'center'); doc.setTextColor(255,255,255);
      txt('COPIA EMPLEADOR', W/2, y+5.5, 9, true, 'center'); doc.setTextColor(0,0,0);
      y += 12;

      txt(e.empresas?.razon_social||'', M, y, 11, true);
      txt(`RUC: ${e.ruc_empresa}`, W-M, y, 9, false, 'right');
      y += 5;
      txt('BOLETA DE PAGO', W/2, y, 12, true, 'center');
      txt(`AÑO ${p.anio}`, W-M, y, 9, false, 'right');
      y += 6; line(y); y += 4;

      // Encabezado empleado
      const cols = [M, 35, 100, 135, 165];
      txt('CÓDIGO', cols[0], y, 8, true); txt('APELLIDOS Y NOMBRES', cols[1], y, 8, true);
      txt('DOC. IDENTIDAD', cols[2], y, 8, true); txt('MES', cols[3], y, 8, true); txt('AÑO', cols[4], y, 8, true);
      y += 5;
      txt(e.id_empleado, cols[0], y, 9); txt(`${e.nombres} ${e.apellidos}`, cols[1], y, 9);
      txt(`${e.tipo_documento} ${e.numero_documento}`, cols[2], y, 9); txt(MESES[p.mes], cols[3], y, 9); txt(p.anio, cols[4], y, 9);
      y += 5; line(y); y += 4;

      txt('REGIMEN', cols[0], y, 8, true); txt('CATEGORÍA', cols[1], y, 8, true);
      txt('CARGO', 65, y, 8, true); txt('LUGAR', cols[2], y, 8, true);
      txt('F. INGRESO', cols[3], y, 8, true); txt('F. CESE', cols[4], y, 8, true);
      y += 5;
      txt(e.regimen?.toUpperCase()||'—', cols[0], y, 9); txt(e.categoria?.toUpperCase()||'—', cols[1], y, 9);
      txt(e.cargo||'—', 65, y, 9); txt(e.locales?.nombre||'—', cols[2], y, 9);
      txt(e.fecha_ingreso||'—', cols[3], y, 9); txt('—', cols[4], y, 9);
      y += 5; line(y); y += 4;

      txt('R. PENS.', cols[0], y, 8, true); txt('CUSPP', cols[1], y, 8, true);
      txt('BANCO', cols[2], y, 8, true); txt('NUM. CUENTA', cols[3], y, 8, true);
      txt('HABER MENSUAL', cols[4], y, 8, true);
      y += 5;
      txt(e.afp||e.sistema_pensionario||'—', cols[0], y, 9);
      txt(e.cuspp||'—', cols[1], y, 9);
      txt(extra.banco||e.banco||'—', cols[2], y, 9);
      txt(e.numero_cuenta||'—', cols[3], y, 9);
      txt(`S/ ${Number(e.sueldo_basico||0).toFixed(2)}`, cols[4], y, 9);
      y += 5; line(y); y += 4;

      // Resumen días
      txt('RESUMEN DE DÍAS', M, y, 9, true); y += 5;
      const dcols = [M, 35, 55, 75, 100, 125, 150, 165];
      txt('TRABAJADOS', dcols[0], y, 8, true); txt('FERIADOS', dcols[1], y, 8, true);
      txt('FALTAS', dcols[2], y, 8, true); txt('SAB. Y DOM.', dcols[3], y, 8, true);
      txt('SUBSIDIADOS', dcols[4], y, 8, true); txt('DESC. S/G', dcols[5], y, 8, true);
      txt('VACACIONES', dcols[6], y, 8, true); txt('TOTAL MES', dcols[7], y, 8, true);
      y += 5;
      txt(getVal('f-dias_laborados'), dcols[0], y, 9); txt(getVal('f-dias_feriados'), dcols[1], y, 9);
      txt(getVal('f-faltas'), dcols[2], y, 9); txt('', dcols[3], y, 9);
      txt(getVal('f-dias_subsidiados'), dcols[4], y, 9); txt('', dcols[5], y, 9);
      txt(getVal('f-vacaciones_gozadas')>0?getVal('f-vacaciones_gozadas'):'0', dcols[6], y, 9);
      txt('31', dcols[7], y, 9);
      y += 5; line(y); y += 4;

      // Ingresos y descuentos (3 columnas)
      const ic = M, dc = 95, ac = 160;
      txt('INGRESOS', ic, y, 9, true); txt('DESCUENTOS', dc, y, 9, true); txt('APORTES EMPLEADOR', ac, y, 9, true);
      y += 5;

      const ingresos = [
        ['HABER BÁSICO',          Number(e.sueldo_basico||0).toFixed(2)],
        ['ASIGNACIÓN FAMILIAR',   Number(e.asignacion_familiar||0).toFixed(2)],
        ['HORAS EXTRAS 25%',      getVal('f-horas_extras_25').toFixed(2)],
        ['HORAS EXTRAS 35%',      getVal('f-horas_extras_35').toFixed(2)],
        ['FERIADOS/DESCANSO',     getVal('f-bono_dia_trabajador').toFixed(2)],
        ['MOVILIDAD',             getVal('f-movilidad').toFixed(2)],
        ['BONO ANTIGÜEDAD',       getVal('f-bono_antiguedad').toFixed(2)],
        ['BONO PUNTUALIDAD',      getVal('f-bono_puntualidad').toFixed(2)],
        ['ASISTENCIA PERFECTA',   getVal('f-bono_asistencia').toFixed(2)],
        ['BUEN DESEMPEÑO',        getVal('f-bono_desempeno').toFixed(2)],
        ['BONO EXCEPCIONAL',      getVal('f-bono_excepcional').toFixed(2)],
        ['AGUINALDO',             getVal('f-aguinaldo').toFixed(2)],
        ['CTS TRUNCO',            getVal('f-cts_trunco').toFixed(2)],
        ['GRAT. ORDINARIA',       getVal('f-grat_trunca').toFixed(2)],
        ['VAC. TRUNCAS',          getVal('f-vacaciones_truncas').toFixed(2)],
        ['VAC. GOZADAS',          getVal('f-vacaciones_gozadas').toFixed(2)],
        ['OTROS INGRESOS',        getVal('f-otros_ingresos').toFixed(2)],
      ];
      const descuentos = [
        ['SNP (13%)',          c.snp.toFixed(2)],
        ['AFP OBLIGATORIO',   c.afpObl.toFixed(2)],
        ['AFP COMISIÓN',      c.afpCom.toFixed(2)],
        ['AFP SEGURO',        c.afpSeg.toFixed(2)],
        ['RETENCIÓN 5TA',     '0.00'],
        ['FALTAS',            ((e.sueldo_basico/30)*getVal('f-faltas')).toFixed(2)],
        ['TARDANZAS',         getVal('f-tardanzas').toFixed(2)],
        ['ADELANTO',          getVal('f-adelanto').toFixed(2)],
        ['OTROS DESCUENTOS',  getVal('f-otros_descuentos').toFixed(2)],
      ];
      const aportes = [['ESSALUD (9%)', c.essalud.toFixed(2)]];

      const maxRows = Math.max(ingresos.length, descuentos.length, aportes.length);
      for (let i=0; i<maxRows; i++) {
        if (ingresos[i])   { txt(ingresos[i][0],   ic,    y, 8); txt(ingresos[i][1],   ic+75, y, 8, false,'right'); }
        if (descuentos[i]) { txt(descuentos[i][0],  dc,    y, 8); txt(descuentos[i][1], dc+55, y, 8, false,'right'); }
        if (aportes[i])    { txt(aportes[i][0],     ac,    y, 8); txt(aportes[i][1],    W-M,   y, 8, false,'right'); }
        y += 5;
      }
      line(y); y += 4;

      // Totales
      txt('TOTAL INGRESOS', ic, y, 9, true);
      txt(`S/ ${c.totalIngresos.toFixed(2)}`, ic+75, y, 9, true, 'right');
      txt('TOTAL DESCUENTOS', dc, y, 9, true);
      txt(`S/ ${c.totalDescuentos.toFixed(2)}`, dc+55, y, 9, true, 'right');
      txt('TOTAL APORTES', ac, y, 9, true);
      txt(`S/ ${c.essalud.toFixed(2)}`, W-M, y, 9, true, 'right');
      y += 7;

      box(M, y, W-2*M, 8, [27,43,94]);
      doc.setTextColor(255,255,255);
      txt('NETO A PAGAR', M+2, y+5.5, 11, true);
      txt(`S/ ${c.neto.toFixed(2)}`, W-M-2, y+5.5, 13, true, 'right');
      doc.setTextColor(0,0,0);
      y += 14;

      txt(`TRABAJADOR: ${e.nombres} ${e.apellidos}`, M, y, 9);
      txt(`${e.tipo_documento}: ${e.numero_documento}`, W-M, y, 9, false, 'right');

      // Guardar en Storage y en legajo
      const pdfBytes = doc.output('arraybuffer');
      const blob = new Blob([pdfBytes], {type:'application/pdf'});
      const fileName = `Boleta_${MESES[p.mes]}_${p.anio}_${e.numero_documento}.pdf`;
      const path = `${e.ruc_empresa}/${e.id_empleado}/boleta_${p.anio}_${p.mes}_${Date.now()}.pdf`;

      const { error: storErr } = await sbClient.storage.from('Legajos').upload(path, blob, {upsert:true, contentType:'application/pdf'});
      if (!storErr) {
        await sbClient.from('legajo_documentos').upsert([{
          id_empleado: e.id_empleado, ruc_empresa: e.ruc_empresa,
          categoria: 'boleta', nombre_archivo: fileName,
          storage_path: path, tamanio_kb: Math.round(blob.size/1024),
          notas: `${MESES[p.mes]} ${p.anio}`
        }], { onConflict: 'storage_path' });
        await sbClient.from('planilla_detalle').update({boleta_path: path}).eq('periodo_id', currentPeriodo.id).eq('id_empleado', e.id_empleado);
      }

      doc.save(fileName);
      alert('✅ Boleta generada y publicada en el portal del empleado');
    }

    async function generarTodasBoletas(periodoId) {
      currentPeriodo = periodos.find(p => p.id === periodoId);
      const { data: detalles } = await sbClient.from('planilla_detalle').select('*').eq('periodo_id', periodoId);
      if (!detalles || !detalles.length) { alert('No hay datos cargados para este período.'); return; }
      // Cargar empleados
      const { data: emps } = await sbClient.from('empleados').select('*, empresas(razon_social,abreviatura), locales(nombre), datos_extra').eq('ruc_empresa', currentPeriodo.ruc_empresa).eq('estado','activo');
      empleados = emps || [];
      for (const det of detalles) {
        currentEmpleado = empleados.find(e => e.id_empleado === det.id_empleado);
        if (!currentEmpleado) continue;
        // Restaurar valores
        window._calc = { totalIngresos: det.total_ingresos, totalDescuentos: det.total_descuentos, neto: det.neto_pagar, essalud: det.essalud, afpObl: det.afp_obligatorio, afpCom: det.afp_comision, afpSeg: det.afp_seguro, snp: det.snp };
        // Para generar boleta sin form renderizado, usamos valores del detalle directamente
        // ... simplificado: generar todas a la vez requiere el form, por ahora generamos una a la vez
      }
      alert('Para generar todas las boletas, abrí el período y generá una por una. Pronto: generación masiva.');
    }

    async function cerrarPeriodo(id) {
      if (!confirm('¿Cerrar este período? No podrás modificar los datos.')) return;
      await sbClient.from('planilla_periodos').update({estado:'cerrado'}).eq('id', id);
      await loadPeriodos();
    }

    function volverLista() {
      document.getElementById('vista-detalle').style.display = 'none';
      document.getElementById('vista-lista').style.display   = 'block';
      loadPeriodos();
    }

    function openNuevoPeriodo() { document.getElementById('modal-periodo').classList.remove('hidden'); }
    function closeModal(id)     { document.getElementById(id).classList.add('hidden'); }

    async function crearPeriodo() {
      const empresa = document.getElementById('np-empresa').value;
      const mes     = parseInt(document.getElementById('np-mes').value);
      const anio    = parseInt(document.getElementById('np-anio').value);
      const errEl   = document.getElementById('modal-error');
      errEl.style.display = 'none';
      if (!empresa) { errEl.textContent = 'Seleccioná una empresa.'; errEl.style.display='block'; return; }
      const session = await checkSession();
      const { error } = await sbClient.from('planilla_periodos').insert([{ ruc_empresa:empresa, mes, anio, created_by: session.user.id }]);
      if (error) { errEl.textContent = error.message.includes('unique') ? 'Ya existe un período para ese mes/año/empresa.' : 'Error al crear.'; errEl.style.display='block'; return; }
      closeModal('modal-periodo');
      await loadPeriodos();
    }

    init();
  </script>
</body>
</html>
